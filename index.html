<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080d14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BIIA">
<title>BIIA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #080d14;
  --surface:  #0e1520;
  --card:     #141e2d;
  --border:   #1e2d42;
  --text:     #dce8f5;
  --muted:    #4a6580;
  --accent:   #00e5ff;
  --accent2:  #7c3aed;
  --success:  #10b981;
  --warn:     #f59e0b;
  --danger:   #ef4444;

  --target-speed:   #38bdf8; --target-speed-bg:  #03111e;
  --target-power:   #fbbf24; --target-power-bg:  #150e00;
  --target-both:    #34d399; --target-both-bg:   #001510;
  --target-other:   #94a3b8; --target-other-bg:  #0a0e14;

  --arch-t:    #a78bfa; --arch-t-bg:    #0f0820;
  --arch-rnn:  #38bdf8; --arch-rnn-bg:  #03111e;
  --arch-gnn:  #34d399; --arch-gnn-bg:  #001510;
  --arch-ens:  #fbbf24; --arch-ens-bg:  #150e00;
  --arch-hdl:  #f472b6; --arch-hdl-bg:  #180510;
  --arch-hat:  #f43f5e; --arch-hat-bg:  #180008;
  --arch-hml:  #fb923c; --arch-hml-bg:  #180800;
  --arch-hfl:  #4ade80; --arch-hfl-bg:  #001508;
  --arch-hd:   #22d3ee; --arch-hd-bg:   #000f18;
  --arch-nf:   #e879f9; --arch-nf-bg:   #150018;
  --arch-llm:  #818cf8; --arch-llm-bg:  #080820;
  --arch-est:  #94a3b8; --arch-est-bg:  #0a0e14;
  --arch-fis:  #a3e635; --arch-fis-bg:  #0c1300;
  --arch-out:  #64748b; --arch-out-bg:  #080d14;

  --task-prev: #34d399; --task-prev-bg: #001510;
  --task-otim: #fbbf24; --task-otim-bg: #150e00;
  --task-rec:  #38bdf8; --task-rec-bg:  #03111e;
  --task-ctrl: #f472b6; --task-ctrl-bg: #180510;
  --task-curv: #a78bfa; --task-curv-bg: #0f0820;
  --task-anom: #f43f5e; --task-anom-bg: #180008;
  --task-ger:  #fb923c; --task-ger-bg:  #180800;
  --task-sim:  #a3e635; --task-sim-bg:  #0c1300;
  --task-risk: #e879f9; --task-risk-bg: #150018;
  --task-rev:  #818cf8; --task-rev-bg:  #080820;
  --task-out:  #64748b; --task-out-bg:  #080d14;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  min-height: 100vh;
  overscroll-behavior: none;
}

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 52px;
  display: flex; align-items: center; gap: 16px;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-size: 22px; font-weight: 800;
  letter-spacing: -1px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo-sub {
  font-size: 10px; color: var(--muted);
  font-weight: 300; letter-spacing: .5px;
  margin-top: -2px;
}
.hdr-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.hdr-count { font-size: 11px; color: var(--muted); }
.hdr-model { font-size: 10px; color: var(--accent); background: #00e5ff15; border: 1px solid #00e5ff30; border-radius: 4px; padding: 2px 8px; }

main { padding: 16px 20px; max-width: 1040px; margin: 0 auto; }

/* ── Modal ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(4px); }
.overlay.hidden { display: none; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; max-width: 400px; width: 100%; }
.modal h2 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 6px; color: var(--accent); }
.modal p { font-size: 12px; color: var(--muted); margin-bottom: 18px; line-height: 1.7; font-family: 'JetBrains Mono', monospace; }
.modal a { color: var(--accent); }
.modal input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 13px; color: var(--text); font-family: 'JetBrains Mono', monospace; outline: none; margin-bottom: 12px; }
.modal input:focus { border-color: var(--accent); }
.modal input::placeholder { color: var(--muted); }
.modal .btn-save { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000; border: none; border-radius: 8px; padding: 12px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Syne', sans-serif; letter-spacing: .5px; }
.modal .hint { font-size: 10px; color: var(--muted); text-align: center; margin-top: 10px; }

/* ── API bar ── */
.api-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.api-ok { font-size: 11px; color: var(--success); }
.btn-sm { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 10px; color: var(--muted); cursor: pointer; font-family: 'JetBrains Mono', monospace; transition: border-color .15s; }
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }

/* ── Drop zone ── */
.dropzone { border: 1px dashed var(--border); border-radius: 12px; padding: 32px 24px; text-align: center; cursor: pointer; transition: all .2s; background: var(--surface); margin-bottom: 14px; position: relative; overflow: hidden; }
.dropzone::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, #00e5ff08, #7c3aed08); opacity: 0; transition: opacity .2s; }
.dropzone:hover::before, .dropzone.active::before { opacity: 1; }
.dropzone:hover, .dropzone.active { border-color: var(--accent); }
.dropzone .icon { font-size: 28px; margin-bottom: 8px; }
.dropzone .label { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; }
.dropzone .hint { font-size: 10px; color: var(--muted); margin-top: 4px; }

/* ── Column selector ── */
.section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; }
.section-title { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
.col-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
@media(min-width: 600px) { .col-grid { grid-template-columns: repeat(3, 1fr); } }

.col-item { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: all .15s; }
.col-item.active { border-color: var(--accent); background: #00e5ff08; }
.col-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.col-name { font-size: 11px; font-weight: 500; color: var(--text); }
.col-item.active .col-name { color: var(--accent); }
.col-toggle { width: 28px; height: 15px; background: var(--border); border-radius: 99px; position: relative; transition: background .15s; flex-shrink: 0; }
.col-toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 11px; height: 11px; background: var(--muted); border-radius: 50%; transition: all .15s; }
.col-item.active .col-toggle { background: var(--accent); }
.col-item.active .col-toggle::after { left: 15px; background: #000; }

.col-mode { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 4px 8px; font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; outline: none; cursor: pointer; display: none; }
.col-item.active .col-mode { display: block; border-color: #00e5ff20; color: var(--text); }
.col-mode option { background: var(--card); }

/* ── Prompt preview ── */
.prompt-preview { display: none; }
.prompt-preview.show { display: block; }
.prompt-box { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-size: 10px; color: var(--muted); line-height: 1.7; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
.prompt-box strong { color: var(--accent); }
.toggle-preview { font-size: 10px; color: var(--accent); cursor: pointer; background: none; border: none; font-family: 'JetBrains Mono', monospace; padding: 0; margin-top: 8px; display: block; }

/* ── Progress ── */
.progress-wrap { margin-bottom: 14px; display: none; }
.progress-wrap.show { display: block; }
.progress-top { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 6px; }
.progress-bar { height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width .4s; }

/* ── Controls ── */
.controls { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.btn { border: none; border-radius: 8px; padding: 9px 18px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Syne', sans-serif; transition: opacity .15s, transform .1s; letter-spacing: .3px; }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: .35; cursor: default; }
.btn-start { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000; }
.btn-pause { background: var(--warn); color: #000; }
.btn-download { background: var(--success); color: #000; }
.btn-clr { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
.search { flex: 1; min-width: 150px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 12px; color: var(--text); font-family: 'JetBrains Mono', monospace; outline: none; }
.search:focus { border-color: var(--accent); }
.search::placeholder { color: var(--muted); }
.count-label { font-size: 10px; color: var(--muted); }

/* ── Stats ── */
.stats-wrap { margin-bottom: 14px; }
.stats { display: flex; flex-wrap: wrap; gap: 6px; }
.stat-pill { border-radius: 99px; padding: 4px 12px; cursor: pointer; transition: transform .15s; border: 1px solid transparent; display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 600; }
.stat-pill:active { transform: scale(0.96); }
.stat-pill.active { border-color: currentColor; }
.stat-pill .sn { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800; }

.p-target-speed { background: var(--target-speed-bg); color: var(--target-speed); }
.p-target-power { background: var(--target-power-bg); color: var(--target-power); }
.p-target-both  { background: var(--target-both-bg);  color: var(--target-both); }
.p-target-other { background: var(--target-other-bg); color: var(--target-other); }
.p-arch-t    { background: var(--arch-t-bg);    color: var(--arch-t); }
.p-arch-rnn  { background: var(--arch-rnn-bg);  color: var(--arch-rnn); }
.p-arch-gnn  { background: var(--arch-gnn-bg);  color: var(--arch-gnn); }
.p-arch-ens  { background: var(--arch-ens-bg);  color: var(--arch-ens); }
.p-arch-hdl  { background: var(--arch-hdl-bg);  color: var(--arch-hdl); }
.p-arch-hat  { background: var(--arch-hat-bg);  color: var(--arch-hat); }
.p-arch-hml  { background: var(--arch-hml-bg);  color: var(--arch-hml); }
.p-arch-hfl  { background: var(--arch-hfl-bg);  color: var(--arch-hfl); }
.p-arch-hd   { background: var(--arch-hd-bg);   color: var(--arch-hd); }
.p-arch-nf   { background: var(--arch-nf-bg);   color: var(--arch-nf); }
.p-arch-llm  { background: var(--arch-llm-bg);  color: var(--arch-llm); }
.p-arch-est  { background: var(--arch-est-bg);  color: var(--arch-est); }
.p-arch-fis  { background: var(--arch-fis-bg);  color: var(--arch-fis); }
.p-arch-out  { background: var(--arch-out-bg);  color: var(--arch-out); border:1px solid var(--border); }
.p-task-prev { background: var(--task-prev-bg); color: var(--task-prev); }
.p-task-otim { background: var(--task-otim-bg); color: var(--task-otim); }
.p-task-rec  { background: var(--task-rec-bg);  color: var(--task-rec); }
.p-task-ctrl { background: var(--task-ctrl-bg); color: var(--task-ctrl); }
.p-task-curv { background: var(--task-curv-bg); color: var(--task-curv); }
.p-task-anom { background: var(--task-anom-bg); color: var(--task-anom); }
.p-task-ger  { background: var(--task-ger-bg);  color: var(--task-ger); }
.p-task-sim  { background: var(--task-sim-bg);  color: var(--task-sim); }
.p-task-risk { background: var(--task-risk-bg); color: var(--task-risk); }
.p-task-rev  { background: var(--task-rev-bg);  color: var(--task-rev); }
.p-task-out  { background: var(--task-out-bg);  color: var(--task-out); border:1px solid var(--border); }
.p-pending   { background: var(--card); color: var(--muted); border: 1px solid var(--border); }

/* ── Table ── */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.table-inner { overflow-x: auto; max-height: 50vh; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 11px; }
thead { position: sticky; top: 0; z-index: 2; }
th { background: var(--card); padding: 9px 12px; text-align: left; color: var(--muted); font-weight: 500; font-size: 9px; text-transform: uppercase; letter-spacing: .6px; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 7px 12px; border-top: 1px solid var(--border); vertical-align: middle; }
tr:hover td { background: var(--card); }
.idx { color: var(--muted); font-size: 9px; width: 36px; }
.title-cell { max-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 28%; color: var(--text); }
.mono-cell { max-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); font-size: 10px; }
.tags-cell { white-space: nowrap; }
.badge { display: inline-block; border-radius: 99px; padding: 1px 7px; font-size: 9px; font-weight: 600; white-space: nowrap; margin: 1px; }
.table-footer { padding: 8px 14px; border-top: 1px solid var(--border); color: var(--muted); font-size: 10px; text-align: center; }

/* ── Toast ── */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--danger); color: #fff; border-radius: 8px; padding: 10px 18px; font-size: 12px; font-weight: 600; display: none; z-index: 999; max-width: 88vw; text-align: center; }
.toast.show { display: block; }
</style>
</head>
<body>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>BIIA</h2>
    <p>BIIA — bibliografia + ia.<br>Cole sua chave Gemini para começar.<br>
    Acesse <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a> → Get API key.</p>
    <input type="password" id="modal-key" placeholder="AIza..." autocomplete="off">
    <button class="btn-save" onclick="saveKey()">Entrar</button>
    <div class="hint">Chave salva apenas neste dispositivo.</div>
  </div>
</div>

<header>
  <div>
    <div class="logo">BIIA</div>
    <div class="logo-sub">bibliografia + ia</div>
  </div>
  <div class="hdr-right">
    <span class="hdr-model" id="hdr-model" style="display:none"></span>
    <span class="hdr-count" id="hdr-count"></span>
    <button class="btn-sm" onclick="changeKey()">chave</button>
  </div>
</header>

<main>
  <div class="api-bar" id="api-bar">
    <span class="api-ok">● Gemini conectado</span>
    <span style="font-size:10px;color:var(--muted);margin-left:4px" id="api-model-label"></span>
  </div>

  <!-- Drop zone -->
  <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
    <input type="file" id="file-input" accept=".csv" style="display:none">
    <div class="icon">📄</div>
    <div class="label" id="dz-label">Carregar CSV</div>
    <div class="hint">Todas as colunas originais são preservadas</div>
  </div>

  <!-- Column selector -->
  <div class="section" id="col-section" style="display:none">
    <div class="section-title">Colunas a classificar</div>
    <div class="col-grid" id="col-grid"></div>
    <button class="toggle-preview" onclick="togglePreview()">▶ ver prompt</button>
    <div class="prompt-preview" id="prompt-preview">
      <div class="prompt-box" id="prompt-box"></div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-top">
      <span id="progress-label">Classificando...</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <!-- Stats -->
  <div class="stats-wrap" id="stats-wrap" style="display:none">
    <div class="stats" id="stats-pills"></div>
  </div>

  <!-- Controls -->
  <div class="controls" id="controls" style="display:none">
    <button class="btn btn-start"    id="btn-start"    onclick="startClassification()">▶ Classificar</button>
    <button class="btn btn-pause"    id="btn-pause"    onclick="pauseClassification()" style="display:none">⏸ Pausar</button>
    <button class="btn btn-download" id="btn-download" onclick="downloadCSV()" disabled>⬇ CSV</button>
    <input  class="search" id="search" placeholder="buscar..." oninput="renderTable()">
    <button class="btn btn-clr"      id="btn-clr"      onclick="clearFilter()" style="display:none">✕</button>
    <span   class="count-label"     id="visible-count"></span>
  </div>

  <!-- Table -->
  <div class="table-wrap" id="table-wrap" style="display:none">
    <div class="table-inner">
      <table>
        <thead><tr id="thead-row"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="table-footer" id="table-footer" style="display:none"></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const LS_KEY = 'biia_gemini_key';
const LS_MOD = 'biia_model';
const BATCH  = 5;
const GEMINI_MODELS = ['gemini-3.1-flash-lite-preview'];

// ── Column definitions ─────────────────────────────────────────────────────
const COL_DEFS = [
  { id: 'target',                   label: 'target',                   type: 'closed' },
  { id: 'architecture',             label: 'architecture',             type: 'multi'  },
  { id: 'model',                    label: 'model',                    type: 'free'   },
  { id: 'complementary_technique',  label: 'complementary_technique',  type: 'free'   },
  { id: 'task',                     label: 'task',                     type: 'closed' },
];

const FILL_MODES = [
  { value: 'empty',   label: 'Preencher vazios'       },
  { value: 'all',     label: 'Sobrescrever tudo'       },
  { value: 'unclear', label: 'Sobrescrever "-" e "outro"' },
];

// ── Prompt blocks ──────────────────────────────────────────────────────────
const PROMPT_BLOCKS = {
  target: `━━ target ━━
O que é previsto/estimado pelo modelo proposto. Use EXATAMENTE uma das opções:
- "velocidade do vento": previsão de wind speed
- "potência": previsão de wind power
- "ambos": prevê tanto velocidade quanto potência
- "outro": outra variável ou não é modelo de previsão
- "-": não aplicável (revisões, otimização pura, etc.)`,

  architecture: `━━ architecture ━━
Liste as famílias arquiteturais do modelo PROPOSTO. Podem ser MÚLTIPLAS tags separadas por vírgula.
Use APENAS as opções abaixo — inclua todas que compõem a arquitetura proposta:
- "Transformer": backbone baseado em atenção (Transformer, Informer, PatchTST, Mamba, Crossformer, Autoformer)
- "Rede Neural": LSTM, GRU, BiLSTM, CNN, TCN, MLP, RNN, SNN, ESN e variantes
- "Graph Neural Network": GNN, GCN, GAT, AGCRN, DCRNN e variantes
- "Ensemble": Random Forest, XGBoost, LightGBM, AdaBoost, Stacking
- "Híbrido Deep Learning": combinação de redes neurais SEM atenção explícita e SEM decomposição central
- "Híbrido Atenção": backbone LSTM/GRU/CNN com atenção ADICIONADA — não é Transformer completo
- "Híbrido Estatístico-ML": estatístico clássico + ML (Weibull+GBM, ARIMA+LSTM)
- "Híbrido Físico-ML": modelo físico + ML (PINN+NN, SDE+NN, WRF+DL)
- "Híbrido Decomposição-ML": decomposição central (EMD, VMD, CEEMDAN, Wavelet) + qualquer preditor
- "Neuro-Fuzzy": sistemas fuzzy + redes neurais (ANFIS, FIS+NN)
- "LLM": Large Language Models para séries temporais (GPT, LLaMA)
- "Estatístico": puramente estatístico (ARIMA, SARIMA, regressão, Bayesian DLM)
- "Físico": puramente físico (NWP, WRF, CFD, LES)
- "Outro": não classificável (KAN, Diffusion, RL puro, GAM, Quantum NN)
- "-": sem modelo proposto claro
REGRAS: Metaheurística e transfer learning NÃO são arquitetura — vão em complementary_technique.
Exemplo: CNN+BiLSTM+GCN → "Rede Neural, Graph Neural Network"`,

  model: `━━ model ━━

// ── CSV ────────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.split(/\r?\n/), headers = parseLine(lines[0]), rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const cols = parseLine(lines[i]), row = {};
    headers.forEach((h, j) => row[h.trim()] = cols[j] || '');
    rows.push(row);
  }
  return rows;
}
function parseLine(line) {
  const r = []; let cur = '', q = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i]==='"'&&line[i+1]==='"') { cur+='"'; i++; }
    else if (line[i]==='"') { q=!q; }
    else if (line[i]===','&&!q) { r.push(cur); cur=''; }
    else cur += line[i];
  }
  r.push(cur); return r;
}

// ── Needs classification check ─────────────────────────────────────────────
function needsClassification(row, col, mode) {
  const val = (row[col] || '').trim();
  if (mode === 'all') return true;
  if (mode === 'empty') return val === '' || val === null;
  if (mode === 'unclear') return val === '' || val === null || val === '-' || val === 'outro' || val === 'other';
  return false;
}

// ── Prompt builder ─────────────────────────────────────────────────────────
function buildPrompt(batch, activeCols) {
  const blocks = activeCols.map(c => PROMPT_BLOCKS[c.id]).join('\n\n');
  const formatEx = activeCols.map(c => {
    const ex = { target:'"potência"', architecture:'"Rede Neural, GNN"', model:'"CEEMDAN+GRU"', complementary_technique:'"PSO"', task:'"previsão"' };
    return `"${c.id}":${ex[c.id]||'"-"'}`;
  }).join(',');
  return `Você é um especialista em ML aplicado à previsão de energia eólica.
Analise o título e o abstract COMPLETO de cada artigo e classifique os campos abaixo.

${blocks}

Responda APENAS com JSON válido, sem markdown:
[{"index":0,${formatEx}}]

Artigos:
${batch.map((r,j)=>`[${j}] Título: ${r.title}\nAbstract: ${r.abstract||''}`).join('\n\n---\n\n')}`;
}

// ── Gemini ─────────────────────────────────────────────────────────────────
async function tryModel(model, key, body) {
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
    { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  if (!res.ok) { const e = await res.json(); throw new Error(e?.error?.message || `Erro ${res.status}`); }
  return res.json();
}

async function classifyBatch(batch, startIdx, activeCols) {
  const key = localStorage.getItem(LS_KEY) || '';
  const prompt = buildPrompt(batch, activeCols);
  const body = { contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0, maxOutputTokens:2048} };
  let data;
  if (activeModel) {
    data = await tryModel(activeModel, key, body);
  } else {
    let lastErr = '';
    for (const m of GEMINI_MODELS) {
      try {
        document.getElementById('progress-label').textContent = `Testando ${m}…`;
        data = await tryModel(m, key, body);
        activeModel = m;
        localStorage.setItem(LS_MOD, m);
        document.getElementById('hdr-model').textContent = m;
        document.getElementById('hdr-model').style.display = 'inline';
        document.getElementById('api-model-label').textContent = m;
        break;
      } catch(e) { lastErr = e.message; continue; }
    }
    if (!data) throw new Error(`Nenhum modelo disponível. Último erro: ${lastErr}`);
  }
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '[]';
  const clean = text.replace(/```json|```/g,'').trim();

  let parsed = [];
  try {
    parsed = JSON.parse(clean);
  } catch(e) {
    // fallback: extract individual objects via regex
    const matches = clean.match(/\{[^{}]*"index"\s*:\s*\d+[^{}]*\}/g) || [];
    matches.forEach(m => {
      try {
        const safe = m.replace(/[\u0000-\u001F\u007F]/g, ' ');
        parsed.push(JSON.parse(safe));
      } catch(_) {}
    });
    if (parsed.length === 0) {
      console.warn('JSON parse failed, skipping batch:', e.message);
      return;
    }
  }

  parsed.forEach(r => {
    const idx = startIdx + r.index;
    if (allRows[idx]) {
      activeCols.forEach(c => { if (r[c.id] !== undefined) allRows[idx][c.id] = r[c.id]; });
    }
  });
}

// ── Classification ─────────────────────────────────────────────────────────
async function startClassification() {
  const key = localStorage.getItem(LS_KEY) || '';
  if (!key.startsWith('AIza')) { showToast('Configure sua chave Gemini primeiro.'); return; }
  if (!allRows.length) { showToast('Carregue um CSV primeiro.'); return; }

  const activeCols = COL_DEFS.filter(c => colStates[c.id].active);
  if (!activeCols.length) { showToast('Selecione pelo menos uma coluna.'); return; }

  stopFlag = false;
  document.getElementById('btn-start').style.display = 'none';
  document.getElementById('btn-pause').style.display = 'inline-block';
  document.getElementById('progress-wrap').classList.add('show');

  // find first row that needs classification in any active col
  const rowNeedsWork = i => activeCols.some(c => needsClassification(allRows[i], c.id, colStates[c.id].mode));
  let start = allRows.findIndex((_, i) => rowNeedsWork(i));
  if (start === -1) { showToast('Nenhuma linha precisa ser classificada com os modos selecionados.'); return; }

  try {
    for (let i = start; i < allRows.length; i += BATCH) {
      if (stopFlag) break;
      // filter batch to only rows that need work
      const batch = allRows.slice(i, i + BATCH);
      await classifyBatch(batch, i, activeCols);
      const done = allRows.filter((_, idx) => !rowNeedsWork(idx)).length;
      const pct = Math.round(done / allRows.length * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-pct').textContent = pct + '%';
      document.getElementById('progress-label').textContent = `Classificando… ${done}/${allRows.length}`;
      document.getElementById('btn-download').disabled = false;
      updateStats(); renderTable();
      if (i + BATCH < allRows.length) await sleep(6000);
    }
  } catch(e) { showToast('Erro: ' + e.message); }

  document.getElementById('btn-pause').style.display = 'none';
  document.getElementById('btn-start').style.display = 'inline-block';
  const allDone = allRows.every((_, i) => !rowNeedsWork(i));
  if (allDone) {
    document.getElementById('btn-start').textContent = '✓ Concluído';
    document.getElementById('btn-start').disabled = true;
    document.getElementById('progress-label').textContent = `✅ ${allRows.length} artigos classificados`;
  } else {
    document.getElementById('btn-start').textContent = '▶ Classificar';
  }
}

function pauseClassification() {
  stopFlag = true;
  document.getElementById('btn-pause').style.display = 'none';
  document.getElementById('btn-start').style.display = 'inline-block';
  document.getElementById('btn-start').textContent = '▶ Classificar';
  document.getElementById('progress-label').textContent = '⏸ Pausado';
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

const STATS_CONFIG = [
  { col:'target', values:['velocidade do vento','potência','ambos','outro','-'], labels:['Velocidade','Potência','Ambos','Outro','-'], css: v => TARGET_CSS[v]||'p-pending' },
  { col:'architecture', values:Object.keys(ARCH_CSS), labels:['Transformer','Rede Neural','GNN','Ensemble','Híb.DL','Híb.Attn','Híb.Estat','Híb.Fís','Híb.Dec','Neuro-Fz','LLM','Estat','Físico','Outro','-'], css: v => ARCH_CSS[v]||'p-pending' },
  { col:'task', values:Object.keys(TASK_CSS), labels:['Previsão','Otimização','Recurso','Controle','Curva','Anomalias','Ger.Dados','Simulação','Risco','Revisão','Outro'], css: v => TASK_CSS[v]||'p-pending' },
];

function updateStats() {
  const activeCols = COL_DEFS.filter(c => colStates[c.id].active).map(c => c.id);
  const pills = [];
  STATS_CONFIG.forEach(cfg => {
    if (!activeCols.includes(cfg.col)) return;
    const counts = {};
    cfg.values.forEach(v => counts[v] = 0);
    allRows.forEach(r => {
      if (cfg.col === 'architecture' && r.architecture) {
        r.architecture.split(',').map(s=>s.trim()).forEach(tag => { if (counts[tag]!==undefined) counts[tag]++; });
      } else if (r[cfg.col]) {
        if (counts[r[cfg.col]] !== undefined) counts[r[cfg.col]]++;
      }
    });
    cfg.values.forEach((v, i) => {
      if (counts[v] === 0) return;
      const isActive = activeFilter.col === cfg.col && activeFilter.val === v;
      pills.push(`<div class="stat-pill ${cfg.css(v)} ${isActive?'active':''}" onclick="toggleFilter('${cfg.col}','${v.replace(/'/g,"\\'")}')"><span class="sn">${counts[v]}</span>${cfg.labels[i]||v}</div>`);
    });
  });
  document.getElementById('stats-pills').innerHTML = pills.join('') || '<span style="font-size:10px;color:var(--muted)">nenhuma coluna com dados</span>';
}

function renderTable() {
  const activeCols = COL_DEFS.filter(c => colStates[c.id].active);
  const q = (document.getElementById('search').value || '').toLowerCase();
  const visible = allRows.map((r,i) => ({...r,_i:i})).filter(r => {
    let matchF = true;
    if (activeFilter.val) {
      if (activeFilter.col === 'architecture') {
        matchF = r.architecture ? r.architecture.split(',').map(s=>s.trim()).includes(activeFilter.val) : false;
      } else {
        matchF = r[activeFilter.col] === activeFilter.val;
      }
    }
    const matchQ = !q || (r.title||'').toLowerCase().includes(q);
    return matchF && matchQ;
  });
  document.getElementById('visible-count').textContent = `${visible.length}/${allRows.length}`;
  const MAX = 300;
  document.getElementById('tbody').innerHTML = visible.slice(0, MAX).map(r => {
    const colCells = activeCols.map(c => {
      const val = r[c.id] || '';
      if (c.id === 'architecture') {
        const badges = val ? val.split(',').map(s=>s.trim()).map(tag=>`<span class="badge ${ARCH_CSS[tag]||'p-arch-out'}">${esc(tag)}</span>`).join('') : '<span class="badge p-pending">…</span>';
        return `<td class="tags-cell">${badges}</td>`;
      }
      if (c.id === 'target') return `<td><span class="badge ${TARGET_CSS[val]||'p-pending'}">${esc(val||'…')}</span></td>`;
      if (c.id === 'task')   return `<td><span class="badge ${TASK_CSS[val]||'p-task-out'}">${esc(val||'…')}</span></td>`;
      return `<td class="mono-cell" title="${esc(val)}">${esc(val||'…')}</td>`;
    }).join('');
    return `<tr><td class="idx">${r._i+1}</td><td class="title-cell" title="${esc(r.title)}">${esc(r.title)}</td>${colCells}</tr>`;
  }).join('');
  const footer = document.getElementById('table-footer');
  if (visible.length > MAX) { footer.style.display='block'; footer.textContent=`mostrando ${MAX} de ${visible.length}`; }
  else footer.style.display='none';
  updateTableHeader();
}

function toggleFilter(col, val) {
  activeFilter = (activeFilter.col===col && activeFilter.val===val) ? {col:null,val:null} : {col,val};
  document.getElementById('btn-clr').style.display = activeFilter.val ? 'inline-block' : 'none';
  updateStats(); renderTable();
}
function clearFilter() { activeFilter={col:null,val:null}; document.getElementById('btn-clr').style.display='none'; updateStats(); renderTable(); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Download ───────────────────────────────────────────────────────────────
function downloadCSV() {
  const newCols = COL_DEFS.map(c => c.id);
  const originalCols = Object.keys(allRows[0]||{}).filter(k => !newCols.includes(k));
  const headers = [...originalCols, ...newCols];
  const lines = [headers.map(h=>`"${h}"`).join(',')];
  allRows.forEach(r => { lines.push(headers.map(h=>`"${String(r[h]||'').replace(/"/g,'""')}"`).join(',')); });
  const encoded = btoa(unescape(encodeURIComponent(lines.join('\n'))));
  const a = document.createElement('a');
  a.href = `data:text/csv;charset=utf-8;base64,${encoded}`;
  a.download = 'biia-output.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
